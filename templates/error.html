<!DOCTYPE html>
<html>
<head>
    <title>Error {{ code }} - Ammonia Monitor</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 60px; text-align: center; }
        .error-code { font-size: 100px; color: #ef4444; font-weight: bold; }
        .error-msg { font-size: 20px; color: rgba(255,255,255,0.7); margin: 20px 0; }
        a { background: #2563eb; color: white; padding: 12px 30px; border-radius: 10px; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-code">{{ code }}</div>
        <div class="error-msg">{{ message }}</div>
        <a href="/">Back to Home</a>
    </div>
</body>
</html>
